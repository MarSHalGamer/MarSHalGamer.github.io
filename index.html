<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>RP City MTAS</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- علامة الحقوق --- */
.crp-brand {
    position: fixed;
    top: 85px; /* نزلتها شوي عشان ما تغطي على المنيو */
    right: 20px;
    font-size: 11px;
    color: rgba(168, 85, 247, 0.5);
    z-index: 999;
    font-family: 'Cairo', sans-serif;
    pointer-events: none;
    direction: ltr;
}

body { 
    margin:0; 
    font-family:'Cairo', sans-serif; 
    background:radial-gradient(circle at top, #6a0dad, #000000 70%); 
    color:white; 
    text-align:center; 
    overflow-x: hidden; 
}

/* --- الهيدر الجديد (مثل الصورة) --- */
.header-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 40px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(168, 85, 247, 0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-logo img { width: 60px; filter: drop-shadow(0 0 10px #a855f7); }

.buttons-container {
    display: flex;
    gap: 10px;
    background: rgba(255, 255, 255, 0.03);
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid rgba(168, 85, 247, 0.2);
}

.buttons-container a, .buttons-container button {
    color: white;
    text-decoration: none;
    font-size: 15px;
    padding: 8px 15px;
    border-radius: 10px;
    transition: 0.3s;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
}

.buttons-container a:hover, .buttons-container button:hover {
    background: rgba(124, 58, 237, 0.3);
    color: #c084fc;
}

/* --- بقية التنسيقات --- */
.news-ticker { background: rgba(124, 58, 237, 0.7); backdrop-filter: blur(5px); color: white; padding: 10px 0; overflow: hidden; position: relative; border-bottom: 1px solid #a855f7; }
.ticker-content { display: inline-block; white-space: nowrap; padding-right: 100%; animation: ticker 25s linear infinite; font-weight: bold; font-size: 16px; }
@keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

.hero-section { margin-top: 100px; padding: 20px; }
h1 { font-size: 45px; text-shadow: 0 0 20px #a855f7; margin-bottom: 5px; }
.hero-section p { color: #ccc; font-size: 20px; }

.admin-section { margin-top: 50px; }
.admin-btn { background: none; border: 1px solid #333; color: #555; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.3s; }
.admin-btn:hover { border-color: #a855f7; color: #a855f7; }

/* المودال */
.admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
.modal-content { background: #1a1b4b; padding: 40px; border-radius: 20px; border: 2px solid #a855f7; width: 320px; }
.modal-content input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 18px; }
.modal-buttons { display: flex; gap: 10px; }
.modal-confirm { flex: 2; background: #7c3aed; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
.modal-cancel { flex: 1; background: #444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; }

#toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); padding:12px 30px; border-radius:10px; box-shadow:0 0 20px #9333ea; display:none; z-index: 3000; }
footer { margin-top: 100px; padding: 30px; color: #666; font-size: 14px; }
</style>
</head>
<body>

<header class="header-nav">
    <div class="buttons-container">
        <a href="owners.html">🕍 القطاعات</a>
        <a href="admins.html">🛡️ الأدمن</a>
        <a href="supporters.html">💙 الداعمين</a>
        <a href="rules.html">📜 القوانين</a>
        <a href="shop.html">🛒 المتجر</a>
        <a href="tickets.html">🎧 الدعم</a>
        <a href="status.html">📊 الحالة</a>
        <button onclick="copyDiscord()">🔗 ديسكورد</button>
    </div>

    <div class="nav-right">
        <div class="nav-logo">
            <img src="logo.png" alt="RP City Logo">
        </div>
    </div>
</header>

<div class="crp-brand">صنع بواسطة CRP | Этот аккаунт был взломан</div>

<div class="news-ticker"> <div class="ticker-content" id="newsText">جاري جلب آخر الأخبار...</div> </div>

<div class="hero-section">
    <h1>RP City Roleplay</h1>
    <p>الموقع الرسمي لسيرفر RP City MTA:SA</p>
    <div style="margin-top: 30px;">
        <a href="mtasa://" style="background: #a855f7; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 20px; box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);">🎮 العب الآن</a>
    </div>
</div>

<div class="admin-section"> 
    <button class="admin-btn" onclick="openAdminModal()">🔐 لوحة الإدارة</button> 
</div>

<div id="adminModal" class="admin-modal">
  <div class="modal-content">
    <h2>🔐 دخول الإدارة</h2>
    <input type="password" id="adminPass" placeholder="••••••••">
    <div class="modal-buttons">
      <button class="modal-confirm" onclick="checkAdminPass()">دخول</button>
      <button class="modal-cancel" onclick="closeAdminModal()">إلغاء</button>
    </div>
  </div>
</div>

<div id="toast">✅ تم نسخ رابط الدسكورد</div>

<footer>© 2026 RP City MTAS — جميع الحقوق محفوظة</footer>

<script>
const BIN_ID_NEWS = "69957a72ae596e708f33b8b9";
const MASTER_KEY = "$2a$10$EVJpa1kkUQx4JG6CPhwT8eMpLADFaWQc7iR5SShpZRDJSGC2sThvi";

async function loadCloudNews() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID_NEWS}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
        const data = await res.json();
        if(data.record && data.record.text) { document.getElementById("newsText").innerText = data.record.text; }
    } catch (e) { document.getElementById("newsText").innerText = "مرحباً بكم في RP City!"; }
}
window.onload = loadCloudNews;

function copyDiscord(){ navigator.clipboard.writeText("https://discord.gg/7U7QF4f5VD").then(()=>{ const t = document.getElementById("toast"); t.style.display="block"; setTimeout(()=>t.style.display="none", 2500); }); }
function openAdminModal() { document.getElementById("adminModal").style.display = "flex"; document.getElementById("adminPass").focus(); }
function closeAdminModal() { document.getElementById("adminModal").style.display = "none"; }
function checkAdminPass() { if (document.getElementById("adminPass").value === "r8p9") { window.location.href = "admin_panel.html"; } else { alert("خاطئ!"); } }
</script>
</body>
</html>
